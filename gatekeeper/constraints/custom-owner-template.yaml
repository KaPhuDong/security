apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredownerlabel
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredOwnerLabel
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredownerlabel
        violation[{"msg": msg}] {
          # Kiểm tra nếu manifest thiếu trường labels hoặc thiếu hẳn key 'owner'
          not input.review.object.metadata.labels.owner
          msg := "Từ chối! Manifest bắt buộc phải bổ sung label 'owner' để định danh đội phát triển."
        }
