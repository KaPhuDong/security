# Build, Scan, Sign và Push Docker image lên GitHub Container Registry
# Lab 2.2: Tích hợp Trivy (CVE scan) + Cosign (image signing) vào CI pipeline
name: Build and Push Image

on:
  push:
    branches:
      - main
      - lab2
    paths:
      - 'src/api/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/w10-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write    # Cần cho cosign (OIDC token)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo '${{ github.repository_owner }}/w10-api' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(BREAKING CHANGE:|!:)"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ steps.semver.outputs.version }}
            type=sha,prefix=v${{ steps.semver.outputs.version }}-

      - name: Build Docker image (local, chưa push)
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.semver.outputs.version }}
          labels: ${{ steps.meta.outputs.labels }}

      # ────────────────────────────────────────────────────────────
      # Lab 2.2a: Trivy scan CVE
      # exit-code: 1 → CI fail ngay nếu phát hiện CVE HIGH hoặc CRITICAL
      # ────────────────────────────────────────────────────────────
      - name: Scan image với Trivy (fail on HIGH/CRITICAL CVE)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.semver.outputs.version }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true            # Bỏ qua CVE chưa có patch (tránh block vô ích)
          severity: 'HIGH,CRITICAL'       # Chỉ fail khi có HIGH hoặc CRITICAL

      # ────────────────────────────────────────────────────────────
      # Push image (chỉ sau khi Trivy pass)
      # ────────────────────────────────────────────────────────────
      - name: Push Docker image lên GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./src/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ────────────────────────────────────────────────────────────
      # Lab 2.2b: Cosign sign image
      # Private key lưu trong GitHub Secret COSIGN_PRIVATE_KEY
      # Public key commit vào signing/cosign.pub
      # Signature được lưu trong GHCR cạnh image (OCI artifact)
      # ────────────────────────────────────────────────────────────
      - name: Cài Cosign
        uses: sigstore/cosign-installer@v3.7.0

      - name: Sign image với private key
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          # Viết private key ra stdin để tránh lưu vào disk
          cosign sign --yes \
            --key <(echo "${{ secrets.COSIGN_PRIVATE_KEY }}") \
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.semver.outputs.version }}
          echo "✅ Image signed: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.semver.outputs.version }}"

      - name: Update rollout.yaml với version mới
        run: |
          sed -i "s|image: ghcr.io/.*/w10-api:.*|image: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.semver.outputs.version }}|g" app-api/rollout.yaml
          sed -i "s|value: \"v.*\"|value: \"v${{ steps.semver.outputs.version }}\"|g" app-api/rollout.yaml

      - name: Commit và push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-api/rollout.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to v${{ steps.semver.outputs.version }}"
            git push
          fi

      - name: Tạo git tag
        run: |
          git tag v${{ steps.semver.outputs.version }} || true
          git push origin v${{ steps.semver.outputs.version }} || true
