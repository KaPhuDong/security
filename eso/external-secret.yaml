# ExternalSecret: Map key từ provider → K8s Secret
# Lab 2.1: refreshInterval: 1m đảm bảo sync < 60s theo yêu cầu
# Pod mount Secret này dạng volume → tự reload, không cần restart
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-creds
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1m                         # Poll mỗi 60s → đáp ứng yêu cầu < 60s
  secretStoreRef:
    name: fake-store
    kind: SecretStore
  target:
    name: db-secret                            # K8s Secret sẽ được tạo tự động
    creationPolicy: Owner                      # ESO là owner; xóa ExternalSecret thì Secret cũng xóa
  data:
    - secretKey: password                      # Key trong K8s Secret
      remoteRef:
        key: demo/db/password                  # Key trên provider
