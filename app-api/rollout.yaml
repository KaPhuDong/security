# Rollout: Progressive delivery với canary strategy
# Sync wave 0: Deploy trước để tạo pods
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: api
  namespace: demo
  labels:
    app: api
  annotations:
    argocd.argoproj.io/sync-wave: '0'
spec:
  replicas: 4
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      securityContext:
        runAsNonRoot: true
      volumes:
        # Lab 2.1: Mount Secret từ ESO dưới dạng volume → tự reload, không cần restart
        - name: db-secret-vol
          secret:
            secretName: db-secret       # ESO tạo tự động từ ExternalSecret
            optional: true              # Pod vẫn start được khi Secret chưa tồn tại
      containers:
        - name: api
          image: ghcr.io/kaphudong/w10-api:0.0.6
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: VERSION
              value: 'v0.0.1'
            - name: ERROR_RATE
              value: '0'
          volumeMounts:
            # Mount secret vào /etc/db-secret/password (dạng file, không phải env)
            # App đọc file này → khi ESO cập nhật Secret, file tự reload mà không restart pod
            - name: db-secret-vol
              mountPath: /etc/db-secret
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
  strategy:
    canary:
      analysis:
        templates:
          - templateName: success-rate
        startingStep: 1
      steps:
        - setWeight: 10
        - pause: { duration: 2m }
        - setWeight: 50
        - pause: { duration: 2m }
        - setWeight: 100
