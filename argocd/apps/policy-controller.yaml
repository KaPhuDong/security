# ArgoCD App: Cài Sigstore Policy Controller via Helm
# sync-wave: "-1" → CRD (ClusterImagePolicy) phải có TRƯỚC khi apply policy
# Policy Controller là admission webhook: intercept Pod creation → verify signature
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: policy-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://sigstore.github.io/helm-charts
    chart: policy-controller
    targetRevision: 0.9.1
    helm:
      values: |
        # Chỉ enforce trên namespace có label policy.sigstore.dev/include=true
        # → Safe: không vô tình chặn system namespaces
        webhook:
          namespaceSelector:
            matchExpressions:
              - key: policy.sigstore.dev/include
                operator: In
                values: ["true"]
  destination:
    server: https://kubernetes.default.svc
    namespace: cosign-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
